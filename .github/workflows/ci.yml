name: BoneAge AI — CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # Backend — Lint & Validate
  # ==========================================
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Type check (optional)
        continue-on-error: true
        run: |
          pip install mypy
          mypy --ignore-missing-imports .

  # ==========================================
  # Frontend — Build
  # ==========================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ==========================================
  # Docker — Compose Build Test
  # ==========================================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config

      - name: Build images (no push)
        run: |
          # Create dummy model files for build test
          touch best_bone_age_model.pth
          touch xgb_model.joblib
          touch ridge_model.joblib
          touch scaler.joblib
          touch ensemble_weights.joblib
          docker compose build
